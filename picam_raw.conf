# picam_raw.conf — runtime configuration for picam_raw
# Restart the service after changing this file.

[network]
raw_main_port  = 8560
raw_lores_port = 8561
telemetry_port = 8555
command_port   = 8556
cpu_core       = 1        # isolated RT core (see README)
active_camera  = 0
lux_camera     = 0
udp_chunk_size = 60000    # bytes of YUV payload per UDP packet
client_timeout = 10       # seconds before idle client is removed
state_file     = /var/lib/picam-raw/state

# ---------------------------------------------------------------------------
# Camera 0 (required)
# ---------------------------------------------------------------------------
[camera0]
index          = 0
label          = front
main_width     = 2304
main_height    = 1296
lores_width    = 640
lores_height   = 360
framerate      = 30
hflip          = true
vflip          = true

# ---------------------------------------------------------------------------
# Camera 1 (optional)
# ---------------------------------------------------------------------------
[camera1]
index          = 1
label          = rear
main_width     = 2304
main_height    = 1296
lores_width    = 640
lores_height   = 360
framerate      = 30
hflip          = true
vflip          = true
