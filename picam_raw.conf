# picam_raw.conf — runtime configuration for picam_raw
# Restart the service after changing this file.
#
# Stream ports and main/lores dimensions come from the aipicam-config
# package's /etc/aipicam/streams.conf, the single source of truth
# shared with picam-orchestrator, picam-hailo, and picam-recorder — the
# UDP wire protocol carries no width/height field, so every reader must
# already agree with what's actually sent. Edit that file (and restart
# every camera-pipeline service) instead of duplicating those values
# here. You can still set main_width/main_height/lores_width/
# lores_height/raw_main_port/raw_lores_port/telemetry_port/command_port
# below to explicitly override the shared file for local debugging.

[network]
cpu_core       = 1        # isolated RT core (see README)
active_camera  = 0
lux_camera     = 0
udp_chunk_size = 60000    # bytes of YUV payload per UDP packet
client_timeout = 10       # seconds before idle client is removed
state_file     = /var/lib/picam-raw/state

# ---------------------------------------------------------------------------
# Camera 0 (required)
# ---------------------------------------------------------------------------
[camera0]
index          = 0
label          = front
framerate      = 30
hflip          = true
vflip          = true

# ---------------------------------------------------------------------------
# Camera 1 (optional)
# ---------------------------------------------------------------------------
[camera1]
index          = 1
label          = rear
framerate      = 30
hflip          = true
vflip          = true
